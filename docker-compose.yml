version: "3.8"

services:
  postgres:
    image: postgres:17-alpine
    container_name: portal-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5441:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d ${POSTGRES_DB} -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: magicsheet-backend
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .env:/app/.env
    ports:
      - "8082:8080"
    networks:
      - default
      - ras-network

volumes:
  postgres_data:

networks:
  default:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: "192.168.6.0/24"
  ras-network:
    external:
      name: ras-backend_default
